services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: self_intro
      POSTGRES_PASSWORD: self_intro
      POSTGRES_DB: self_intro
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U self_intro -d self_intro"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
